<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EEUM 시작 중</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      background: #000;
      color: #fff;
    }
    .box { text-align: center; }
    .sub { margin-top: 8px; opacity: 0.7; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div style="font-size:22px;">EEUM 시작 중…</div>
    <div class="sub">서버 준비를 기다리는 중입니다</div>
  </div>

  <script>
    const healthCheckUrl = "http://localhost:8080/ping";
    const appUrl = "http://localhost:8080/";
    const pollIntervalMs = 1000;

    async function waitForServer() {
      try {
        const res = await fetch(healthCheckUrl, { cache: "no-store" });
        if (res.ok) {
          location.replace(appUrl);
          return;
        }
      } catch (_) {}

      setTimeout(waitForServer, pollIntervalMs);
    }

    waitForServer();
  </script>
</body>
</html>
